name: Release

# v* 태그 push 시 자동 실행
# 예: git tag v1.2.0 && git push origin v1.2.0
#
# 결과물: GitHub Release 페이지에 RaidMitTracker-vX.X.X.zip 첨부
# zip 내부 구조: RaidMitTracker/ 폴더 아래 모든 파일 (CurseForge 요구사항)
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="RaidMitTracker-${VERSION}.zip"

          # CurseForge 요구사항: zip 안에 애드온 이름 폴더가 루트여야 함
          # 임시 디렉토리에 RaidMitTracker/ 폴더로 복사 후 zip 생성
          mkdir -p /tmp/pkg/RaidMitTracker
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.pkgmeta' \
            --exclude='DEVLOG.md' \
            --exclude='CHANGELOG.md' \
            --exclude='curseforge-description.html' \
            . /tmp/pkg/RaidMitTracker/

          cd /tmp/pkg
          zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" RaidMitTracker/

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found" CHANGELOG.md \
            > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: ${{ env.ZIP_NAME }}
