name: Release

# v* 태그 push 시 자동 실행
# 예: git tag v1.2.0 && git push origin v1.2.0
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # BigWigs packager 스크립트를 직접 실행
      # .pkgmeta 설정 기반으로 zip 패키징 → CurseForge 업로드 → GitHub Release 생성
      # 문서: https://github.com/BigWigs/packager
      - name: Package and upload
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          CURSE_PROJECT_ID: ${{ vars.CURSE_PROJECT_ID }}
        run: |
          curl -s https://raw.githubusercontent.com/BigWigs/packager/release/release.sh | bash
